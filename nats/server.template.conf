# Template NATS authz policy for Staccato.
# `make bootstrap-nats-keys` renders concrete keys into nats/server.conf.
# `make bootstrap-agent-key AGENT=<id>` adds agent-specific key entries.

port: 4222
http_port: 8222
jetstream: enabled

authorization {
  users: [
    # platform
    {
      nkey: "REPLACE_WITH_PLATFORM_USER_NKEY"
      permissions: {
        publish: [
          "staccato.command.*"
          "staccato.file.request.*"
          "staccato.log.request.*"
          "staccato.capability.request.*"
        ]
        subscribe: [
          "staccato.agent.register"
          "staccato.agent.heartbeat"
          "staccato.command.event.*"
          "staccato.file.response.*"
          "staccato.logs.*.*"
        ]
      }
    }
    # default-agent or agent/<id>
    {
      nkey: "REPLACE_WITH_AGENT_USER_NKEY"
      permissions: {
        publish: [
          "staccato.agent.register"
          "staccato.agent.heartbeat"
          "staccato.command.event.*"
          "staccato.file.response.*"
          "staccato.logs.*.*"
        ]
        subscribe: [
          "staccato.command.*"
          "staccato.file.request.*"
          "staccato.log.request.*"
          "staccato.capability.request.*"
        ]
      }
    }
  ]
}
