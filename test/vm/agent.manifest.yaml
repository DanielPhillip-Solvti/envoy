version: 1
name: local-test-vm
repo: "DanielPhillip-Solvti/staccato"
environments: test/vm/envs
docker:
  compose_file: docker-compose.yaml
  project_pattern: staccato-{environment}
vm_scripts:
  health:
    path: test/vm/scripts/health.sh
    args: []
    timeout: 10s
  disk:
    path: test/vm/scripts/disk.sh
    args: []
    timeout: 10s
  deploy:
    path: test/vm/scripts/deploy.sh
    args: ["branch"]
    timeout: 2m
env_scripts:
  ensure_repo:
    path: test/vm/scripts/ensure_repo.sh
    args: ["repo", "branch"]
    timeout: 2m
  checkout_commit:
    path: test/vm/scripts/checkout_commit.sh
    args: ["commit"]
    timeout: 45s
  restart:
    path: test/vm/scripts/restart.sh
    args: []
    timeout: 30s
  up:
    path: test/vm/scripts/up.sh
    args: []
    timeout: 30s
  down:
    path: test/vm/scripts/down.sh
    args: []
    timeout: 30s
files:
  sample: test/vm/files/sample.txt
