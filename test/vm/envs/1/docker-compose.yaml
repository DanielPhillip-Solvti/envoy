services:
  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    restart: unless-stopped

  cache:
    image: redis:alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped