services:
  nats:
    image: nats:2.10
    command: ["-c", "/etc/nats/server.conf"]
    volumes:
      - ./nats/server.conf:/etc/nats/server.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"

  platform:
    image: ghcr.io/danielphillip-solvti/staccato-platform:latest
    env_file:
      - .env
    environment:
      STACCATO_HTTP_ADDR: ":8080"
      STACCATO_NATS_URL: nats://nats:4222
      STACCATO_NATS_NKEY: /run/secrets/staccato-platform.nk
    volumes:
      - ./secrets/platform.nk:/run/secrets/staccato-platform.nk:ro
    ports:
      - "8080:8080"
    depends_on:
      - nats


