{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="/static/app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">envoy</div>
    <nav class="top-actions">
      <a class="home-link" href="/">Home</a>
    </nav>
  </header>
  <main class="page-shell">
    {{if eq .Body "home_page"}}
      {{template "home_page" .Data}}
    {{else if eq .Body "agent_page"}}
      {{template "agent_page" .Data}}
    {{else}}
      <section class="panel">
        <h1>Unknown view</h1>
        <p>The requested view could not be rendered.</p>
      </section>
    {{end}}
  </main>
</body>
</html>
{{end}}
