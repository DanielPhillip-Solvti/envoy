{{define "tab_commands"}}
<section>
  <div class="panel-head">
    <h2>Commands</h2>
  </div>

  <div class="commands-grid">
    {{range .Agent.Registration.Scripts}}
      <form class="command-form" hx-post="/agents/{{$.Agent.Registration.AgentID}}/commands" hx-target="#command-status" hx-swap="innerHTML">
        <h3>{{.Scope}} / {{.Name}}</h3>
        <input type="hidden" name="scope" value="{{.Scope}}">
        <input type="hidden" name="name" value="{{.Name}}">
        {{if eq .Scope "env"}}
          <label>Environment
            <input name="environment" value="{{$.SelectedEnvironment}}" placeholder="environment name">
          </label>
        {{end}}
        {{range .Args}}
          <label>{{.}}
            <input name="args" placeholder="{{.}}">
          </label>
        {{end}}
        <button type="submit">Run</button>
      </form>
    {{else}}
      <p class="muted">No script capabilities were registered by this agent.</p>
    {{end}}
  </div>

  <section id="command-status" class="command-status">
    {{template "command_status_empty" .}}
  </section>
</section>
{{end}}
