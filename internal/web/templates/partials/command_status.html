{{define "command_status_empty"}}
<div hidden></div>
{{end}}

{{define "command_status"}}
<div hidden>
  <div hx-get="/commands/{{.CommandID}}/events" hx-trigger="load, every 2s" hx-swap="innerHTML"></div>
</div>
{{end}}

{{define "command_events"}}
<div hidden>
  {{range .Toasts}}
    <span
      data-command-toast="true"
      data-toast-key="{{.Key}}"
      data-toast-status="{{.Status}}"
      data-toast-title="{{.Title}}"
      data-toast-message="{{.Message}}"
      data-toast-meta="{{.Meta}}"
    ></span>
  {{end}}
</div>
{{if .RefreshCommitsURL}}
  <div hx-get="{{.RefreshCommitsURL}}" hx-trigger="load delay:150ms" hx-target="#tab-panel" hx-swap="innerHTML"></div>
{{end}}
{{end}}
