{{define "command_status_empty"}}
<div hidden></div>
{{end}}

{{define "command_status"}}
<div hidden>
  <div hx-get="/commands/{{.CommandID}}/events" hx-trigger="load, every 2s" hx-swap="innerHTML"></div>
</div>
{{end}}

{{define "command_events"}}
<div hidden>
  {{range .Events}}
    {{if or (eq .Status "started") (eq .Status "succeeded") (eq .Status "failed")}}
      <span
        data-command-toast="true"
        data-toast-key="{{.CommandID}}:{{.Status}}:{{.SentAt.UnixNano}}"
        data-toast-status="{{.Status}}"
        data-toast-title="{{if .Scope}}{{.Scope}}/{{end}}{{if .Name}}{{.Name}}{{else if .CommandID}}cmd:{{.CommandID}}{{else}}unknown{{end}}"
        data-toast-message="{{if .Stream}}[{{.Stream}}] {{end}}{{.Message}}"
        data-toast-meta="{{if .Environment}}{{.Environment}} · {{end}}{{if .SentAt.IsZero}}pending{{else}}{{.SentAt.Format "15:04:05"}}{{end}}"
      ></span>
    {{end}}
  {{end}}
</div>
{{if .RefreshCommitsURL}}
  <div hx-get="{{.RefreshCommitsURL}}" hx-trigger="load delay:150ms" hx-target="#tab-panel" hx-swap="innerHTML"></div>
{{end}}
{{end}}
